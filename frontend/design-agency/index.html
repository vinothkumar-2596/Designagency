    <style>
      /* ============================================================
         Pre-React boot loader — clean, minimal, professional.
         Single brand tile, brand name, one thin progress rail.
         Hidden by inline script when <header class="site-header">
         appears in the DOM.
         ============================================================ */

      #bootloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse at 50% 48%, rgba(255, 106, 0, 0.09), transparent 55%),
          #0a0a0a;
        font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: rgba(255, 255, 255, 0.92);
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.55s cubic-bezier(0.65, 0.05, 0.36, 1),
          visibility 0s linear 0.55s;
      }
      #bootloader.bootloader--hidden {
        opacity: 0;
        visibility: hidden;
      }

      .bootloader__stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 0 24px;
      }

      /* The brand tile — a single 36px square, gentle pulse. */
      .bootloader__mark {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: linear-gradient(135deg, #ffc28a 0%, #ff6a00 100%);
        box-shadow:
          0 0 0 1px rgba(255, 165, 90, 0.35),
          0 0 28px rgba(255, 106, 0, 0.38),
          inset 0 0 10px rgba(255, 210, 170, 0.5);
        animation: bootloader-pulse 2.2s ease-in-out infinite;
      }
      @keyframes bootloader-pulse {
        0%, 100% { transform: scale(1);    box-shadow: 0 0 0 1px rgba(255, 165, 90, 0.35), 0 0 24px rgba(255, 106, 0, 0.32), inset 0 0 10px rgba(255, 210, 170, 0.5); }
        50%      { transform: scale(1.04); box-shadow: 0 0 0 1px rgba(255, 165, 90, 0.5),  0 0 38px rgba(255, 106, 0, 0.55), inset 0 0 10px rgba(255, 210, 170, 0.5); }
      }

      .bootloader__name {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.015em;
        color: rgba(255, 255, 255, 0.92);
      }

      /* Thin progress rail with shimmer. */
      .bootloader__bar {
        position: relative;
        width: 180px;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bootloader__bar::before {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, #ff6a00 50%, transparent);
        animation: bootloader-shimmer 1.5s ease-in-out infinite;
      }
      @keyframes bootloader-shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      @media (prefers-reduced-motion: reduce) {
        .bootloader__mark,
        .bootloader__bar::before { animation: none; }
        .bootloader__bar::before { width: 60%; }
      }
    </style>
  </head>
  <body>
    <div id="bootloader" role="status" aria-live="polite" aria-label="Loading BrandViora India">
      <div class="bootloader__stage">
        <span class="bootloader__mark" aria-hidden="true"></span>
        <span class="bootloader__name">BrandViora India</span>
        <span class="bootloader__bar" aria-hidden="true"></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide the bootloader as soon as the Layout's <header class="site-header">
      // appears in the DOM — that's the signal that the first route has actually
      // rendered (not just the Suspense fallback).
      (function () {
        var loader = document.getElementById('bootloader');
        if (!loader) return;

        var hidden = false;
        function hide() {
          if (hidden) return;
          hidden = true;
          loader.classList.add('bootloader--hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 650);
        }

        var observer = new MutationObserver(function () {
          if (document.querySelector('.site-header')) {
            observer.disconnect();
            setTimeout(hide, 140);
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Safety net — never block the page for more than 6 seconds.
        setTimeout(function () {
          observer.disconnect();
          hide();
        }, 6000);
      })();
    </script>
  </body>
