<!doctype html>

      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"

    <link

      rel="stylesheet"
    />

    <style>
      /* Pre-React boot loader — shown before the first route chunk paints.
         Hidden by inline script the moment <header class="site-header"> appears. */
      #bootloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #e7e5df;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.6s cubic-bezier(0.65, 0.05, 0.36, 1),
          visibility 0s linear 0.6s;
      }
      #bootloader.bootloader--hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* gentle texture so the empty space doesn't feel flat */
      #bootloader::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        background-size: 88px 88px;
        -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
        mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
        pointer-events: none;
      }
      #bootloader::after {
        content: '';
        position: absolute;
        top: -180px;
        right: -180px;
        width: 520px;
        height: 520px;
        background: radial-gradient(circle, rgba(255, 106, 0, 0.16), transparent 60%);
        pointer-events: none;
      }

      .bootloader__logo {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
      }
      .bootloader__mark {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        background: linear-gradient(135deg, #ffc28a 0%, #ff6a00 100%);
        box-shadow:
          0 0 0 1px rgba(255, 165, 90, 0.4),
          0 0 24px rgba(255, 106, 0, 0.35),
          inset 0 0 8px rgba(255, 210, 170, 0.6);
        position: relative;
      }
      .bootloader__mark::after {
        content: '';
        position: absolute;
        inset: 3px;
        border-radius: 2px;
        background: linear-gradient(135deg, #ffd4a8 0%, #ff6a00 80%);
        opacity: 0.7;
      }
      .bootloader__name {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: #14110d;
      }

      .bootloader__bar {
        width: 220px;
        height: 1px;
        background: rgba(20, 17, 13, 0.08);
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .bootloader__bar::before {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, #ff6a00 50%, transparent);
        box-shadow: 0 0 18px rgba(255, 106, 0, 0.45);
        animation: bootloader-shimmer 1.6s cubic-bezier(0.7, 0, 0.3, 1) infinite;
      }
      @keyframes bootloader-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }

      .bootloader__caption {
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(20, 17, 13, 0.5);
        position: relative;
        z-index: 1;
      }

      @media (prefers-reduced-motion: reduce) {
        .bootloader__bar::before {
          animation: none;
          width: 60%;
        }
      }
    </style>
  </head>
  <body>
    <div id="bootloader" role="status" aria-live="polite" aria-label="Loading BrandView India">
      <div class="bootloader__logo">
        <span class="bootloader__mark" aria-hidden="true"></span>
        <span class="bootloader__name">BrandView India</span>
      </div>
      <div class="bootloader__bar" aria-hidden="true"></div>
      <div class="bootloader__caption">Preparing the studio</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide the bootloader as soon as the Layout's <header class="site-header">
      // appears in the DOM — that's the signal that the first route has actually
      // rendered (not just the Suspense fallback).
      (function () {
        var loader = document.getElementById('bootloader');
        if (!loader) return;

        var hidden = false;
        function hide() {
          if (hidden) return;
          hidden = true;
          loader.classList.add('bootloader--hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 700);
        }

        var observer = new MutationObserver(function () {
          if (document.querySelector('.site-header')) {
            observer.disconnect();
            // small grace period so the first paint settles before the fade
            setTimeout(hide, 120);
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Safety net — never block the page for more than 6s
        setTimeout(function () {
          observer.disconnect();
          hide();
        }, 6000);
      })();
    </script>
  </body>
</html>
